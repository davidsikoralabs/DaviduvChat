<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení</title>

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/index.css">
</head>
<body>

<div class="auth-wrapper">

    <div class="auth-card">
        <h2>Přihlášení</h2>
        <img class="login-logo" src="/assets/logo.jpg" alt="Logo">

        <label>Email</label>
        <input id="loginEmail" type="email" placeholder="Váš email">

        <label>Heslo</label>
        <input id="loginPassword" type="password" placeholder="Vaše heslo">

        <button id="loginBtn">Přihlásit se</button>

        <div class="auth-links">
            <a onclick="window.location.href='/register.html'">Nemáte účet? Registrace</a>
            <a onclick="window.location.href='/reset-password.html'">Zapomenuté heslo</a>
        </div>
    </div>

</div>

<script type="module" src="/pages/login.js"></script>

</body>
</html>
