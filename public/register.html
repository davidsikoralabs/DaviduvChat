<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení</title>

    <!-- 🔥 Tohle tam musí být -->
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/index.css">
</head>

<body>
    <div class="auth-wrapper">

        <div class="auth-card">
            <h2>Registrace</h2>
            <img class="login-logo" src="/assets/logo.jpg" alt="Logo">

            <label>Uživatelské jméno</label>
            <input id="regUsername" type="text" placeholder="Vaše přezdívka">

            <label>Email</label>
            <input id="regEmail" type="email" placeholder="Váš email">

            <label>Heslo</label>
            <input id="regPassword" type="password" placeholder="Zvolte heslo">

            <label>Potvrzení hesla</label>
            <input id="regPassword2" type="password" placeholder="Zadejte heslo znovu">

            <button id="registerBtn">Vytvořit účet</button>

            <div class="auth-links">
                <a href="/login.html">Máte účet? Přihlášení</a>
            </div>
        </div>

    </div>

    <script type="module" src="/pages/register.js"></script>
</body>

</html>
