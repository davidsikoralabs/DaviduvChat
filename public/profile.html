<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil</title>

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/index.css">

</head>

<body>

    <div class="profile-wrapper">

        <div class="profile-card">

            <img id="avatar" class="avatar" src="">


            <button id="changeAvatarBtn" class="change-photo">Změnit fotku</button>
            <input type="file" id="avatarInput" accept="image/*" style="display:none">

            <img class="profile-logo" src="/assets/logo.jpg" alt="Logo">

            <h2 id="usernameDisplay" class="username"></h2>
            <p id="bioDisplay" class="bio"></p>

            <div class="profile-info">
                <div>Email: <span id="emailDisplay"></span></div>
                <div>Registrován: <span id="createdAtDisplay"></span></div>
            </div>

            <div class="profile-stats">
                <div class="stat">
                    <span id="followersCount">0</span>
                    <label>Sledující</label>
                </div>
                <div class="stat">
                    <span id="followingCount">0</span>
                    <label>Sledování</label>
                </div>
            </div>

            <div class="follow-btn-wrapper">
                <button id="followBtn">Sledovat</button>
            </div>

            <div class="profile-buttons">
                <button id="backBtn" class="back-btn">Zpět</button>
                <button id="dmBtn" class="dm-btn">Napsat zprávu</button>
                <button id="editProfileBtn">Upravit profil</button>
                <button id="chatBtn" class="chat">Chat</button>
                <button id="logoutBtn" class="logout">Odhlásit se</button>
            </div>

        </div>

        <!-- MODAL BACKDROP -->
        <div id="editModal" class="modal-backdrop">
            <div class="modal">
                <h3>Upravit profil</h3>

                <label>Uživatelské jméno</label>
                <input type="text" id="modalUsername">

                <label>Bio</label>
                <textarea id="modalBio"></textarea>

                <div class="modal-buttons">
                    <button id="saveProfileBtn" class="save">Uložit</button>
                    <button id="closeModalBtn" class="cancel">Zrušit</button>
                </div>
            </div>
        </div>

        <div id="followModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <span id="modalTitle"></span>
                    <button id="closeModal">✕</button>
                </div>
                <div id="modalList" class="modal-list"></div>
            </div>
        </div>

        <div class="profile-tabs">
            <button class="tab-btn active" data-tab="feed">Feed</button>
            <button class="tab-btn" data-tab="gallery">Galerie</button>
            <button class="tab-btn" data-tab="market">Marketplace</button>
        </div>

        <div id="tab-content-feed">
            <div class="feed-section">

                <div class="create-post-box">
                    <textarea id="postText" placeholder="Napiš něco..."></textarea>

                    <div class="create-post-actions">
                        <button id="addPostPhotoBtn">📷</button>
                        <input type="file" id="postPhotoInput" accept="image/*" multiple style="display:none;">
                        <button id="publishPostBtn" class="publish-btn">Publikovat</button>
                    </div>

                    <div id="postPhotoPreview" class="post-photo-preview"></div>
                </div>

                <div id="feed" class="feed-list"></div>

            </div>
        </div>

        <div id="tab-content-gallery" class="hidden">
            <div class="gallery-grid"></div>
            <input type="file" id="uploadPhoto" accept="image/*" multiple style="display:none;">
            <label for="uploadPhoto" class="upload-btn">Nahrát fotky</label>
        </div>

        <div id="photoModal" class="hidden photo-modal">
            <span id="photoModalClose" class="photo-modal-close">&times;</span>
            <img id="photoModalImg" class="photo-modal-img">
            <button id="photoDeleteBtn" class="photo-delete-btn hidden">Smazat</button>
        </div>

        <div id="postModal" class="hidden post-modal">
            <span id="postModalClose" class="post-modal-close">&times;</span>

            <div class="post-modal-carousel">
                <div class="post-modal-track"></div>
            </div>

            <button class="post-modal-prev">‹</button>
            <button class="post-modal-next">›</button>
        </div>


        <div id="tab-content-market" class="hidden">
            <div class="market-section">
                <h3>Marketplace</h3>
                <p>Marketplace brzy…</p>
            </div>
        </div>

        <div id="lightbox" class="lightbox hidden">
            <img id="lightbox-img">
        </div>

    </div>

    <script type="module" src="/pages/profile.js"></script>
    <script type="module" src="/pages/global.js"></script>

    <div id="globalInboxWrapper">
        <a href="/messages.html" id="inboxIcon">📨</a>
        <a href="/search.html" id="searchIcon">🔍</a>
        <span id="inboxDot"></span>
    </div>
</body>

</html>
