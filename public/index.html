<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Jednoduchý chat</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 20px auto; }
    #chat { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; }
    .msg { margin-bottom: 8px; }
    .user { font-weight: bold; margin-right: 5px; }
    .time { color: #888; font-size: 0.8em; margin-left: 5px; }
    #inputRow { margin-top: 10px; display: flex; gap: 5px; }
    #message { flex: 1; }
  </style>
</head>
<body>
  <h1>Veřejný chat</h1>
  <div id="chat"></div>

  <div id="inputRow">
    <input id="message" type="text" placeholder="Napiš zprávu...">
    <button id="send">Odeslat</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    let username = null;
    while (!username) {
      username = prompt("Zadej svou přezdívku:");
      if (username) username = username.trim();
    }
    socket.emit("setName", username);

    const chat = document.getElementById("chat");
    const input = document.getElementById("message");
    const sendBtn = document.getElementById("send");

    function addMessage(msg) {
      const div = document.createElement("div");
      div.className = "msg";
      div.innerHTML = `<span class="user">${msg.user}:</span> ${msg.text} <span class="time">${msg.time}</span>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    sendBtn.addEventListener("click", () => {
      const text = input.value.trim();
      if (!text) return;
      socket.emit("sendMessage", text);
      input.value = "";
      input.focus();
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendBtn.click();
    });

    socket.on("receiveMessage", (msg) => {
       addMessage(msg);
    });

    socket.on("chatHistory", (history) => {
       history.forEach(msg => addMessage(msg));
    });

    function addMessage(msg) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `
    <span class="user" style="color:${msg.color}">${msg.user}:</span>
    ${msg.text}
    <span class="time">${msg.time}</span>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}


    
  </script>
</body>
</html>
