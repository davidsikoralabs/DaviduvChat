<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Výběr místnosti</title>

  <link rel="stylesheet" href="style.css">

  <style>
    /* Přidáno jen pro hlavní stránku – nenaruší chat */
    .page-wrapper {
      max-width: 600px;
      margin: 0 auto;
      background: #1e1e2f;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      color: #eee;
    }

    .room {
      padding: 12px 16px;
      background: #2d2d44;
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      font-size: 18px;
    }

    .room:hover {
      background: #3a3952;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #000;
      color: #eee;
      margin-bottom: 12px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      background: #6c5ce7;
      color: white;
      font-size: 18px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #8e7ffb;
    }
  </style>
</head>

<body>

  <div class="page-wrapper">

    <h1 style="text-align:center; margin-bottom: 20px;">Chat – výběr místnosti</h1>

    <label>Vaše jméno:</label>
    <input id="username" type="text" placeholder="Zadejte jméno">

    <h2>Místnosti</h2>
    <div id="rooms"></div>

    <h3>Vytvořit novou místnost</h3>
    <input id="newRoomName" type="text" placeholder="Název místnosti">
    <input id="adminPassword" type="password" placeholder="Admin heslo">
    <button id="createRoomBtn">Vytvořit</button>

  </div>

  <script>
    async function loadRooms() {
      const res = await fetch("/api/rooms");
      const rooms = await res.json();

      const container = document.getElementById("rooms");
      container.innerHTML = "";

      rooms.forEach(room => {
        const div = document.createElement("div");
        div.className = "room";
        div.textContent = room.name + " (" + room.users + " online)";
        div.onclick = () => enterRoom(room.id);
        container.appendChild(div);
      });
    }

    function enterRoom(roomId) {
      const username = document.getElementById("username").value.trim();
      if (!username) {
        alert("Zadejte jméno!");
        return;
      }

      localStorage.setItem("username", username);
      localStorage.setItem("roomId", roomId);

      window.location.href = "/room.html";
    }

    document.getElementById("createRoomBtn").onclick = async () => {
      const name = document.getElementById("newRoomName").value.trim();
      const password = document.getElementById("adminPassword").value.trim();

      if (!name || !password) {
        alert("Vyplňte název i heslo!");
        return;
      }

      const res = await fetch("/api/rooms", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, password })
      });

      const data = await res.json();

      if (data.error) {
        alert(data.error);
      } else {
        alert("Místnost vytvořena!");
        loadRooms();
      }
    };

    loadRooms();
  </script>

</body>
</html>
