<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="stylesheet" href="style.css">

</head>

<body>
  <div class="chat-wrapper">
    <!-- celý chat -->
    <div id="chat"></div>

    <div id="inputBar">
      <input id="name" placeholder="Jméno">
      <input id="message" placeholder="Zpráva">
      <button id="sendButton">Send</button>
    </div>
  </div>

  <script src="https://daviduvchat.onrender.com/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>

</html>
