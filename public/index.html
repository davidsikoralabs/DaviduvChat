<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <title>Chat</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: system-ui, sans-serif; background:#7d7b90; color:#eee; margin:0; display:flex; flex-direction:column; height:100vh; }
    #chat { flex:1; overflow-y:auto; padding:16px; }
    .msg { margin-bottom:6px; }
    .user { font-weight:bold; margin-right:4px; }
    .time { font-size:0.75rem; color:#888; margin-left:6px; }
    #inputBar { display:flex; padding:8px; gap:8px; border-top:1px solid #333; }
    #name, #message { flex:1; padding:6px 8px; border-radius:4px; border:1px solid #444; background:#000; color:#eee; }
    button { padding:6px 12px; border-radius:4px; border:none; background:#6c5ce7; color:white; cursor:pointer; }
    button:hover { background:#8e7ffb; }
  </style>
</head>
<body>
  <div class="chat-wrapper">
  <div id="chat"></div>

    <div id="inputBar">
      <input id="name" type="text" placeholder="Tvoje jméno" />
      <input id="message" type="text" placeholder="Napiš zprávu..." />
      <button id="sendBtn">Poslat</button>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
