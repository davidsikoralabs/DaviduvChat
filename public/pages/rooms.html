<div class="page-wrapper">

    <h1 style="text-align:center; margin-bottom: 20px;">Chat – výběr místnosti</h1>

    <label>Vaše jméno:</label>
    <input id="username" type="text" placeholder="Zadejte jméno">

    <h2>Místnosti</h2>
    <div id="rooms"></div>

    <h3>Vytvořit novou místnost</h3>
    <input id="newRoomName" type="text" placeholder="Název místnosti">
    <input id="adminPassword" type="password" placeholder="Admin heslo">
    <button id="createRoomBtn">Vytvořit</button>

</div>

<script>
    async function loadRooms() {
        const res = await fetch("/api/rooms");
        const rooms = await res.json();

        const container = document.getElementById("rooms");
        container.innerHTML = "";

        rooms.forEach(room => {
            const div = document.createElement("div");
            div.className = "room";

            div.innerHTML = `
    <span class="roomName">${room.name} (${room.users} online)</span>
    <button class="deleteRoom" data-id="${room.id}">×</button>
  `;

            // kliknutí na název → vstup do místnosti
            div.querySelector(".roomName").onclick = () => enterRoom(room.id);

            container.appendChild(div);
        });

    }

    function enterRoom(roomId) {
        const username = document.getElementById("username").value.trim();
        if (!username) {
            alert("Zadejte jméno!");
            return;
        }

        localStorage.setItem("username", username);
        localStorage.setItem("roomId", roomId);

        window.location.href = "/room.html";
    }

    document.getElementById("createRoomBtn").onclick = async () => {
        const name = document.getElementById("newRoomName").value.trim();
        const password = document.getElementById("adminPassword").value.trim();

        if (!name || !password) {
            alert("Vyplňte název i heslo!");
            return;
        }

        const res = await fetch("/api/rooms", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, password })
        });

        const data = await res.json();

        if (data.error) {
            alert(data.error);
        } else {
            alert("Místnost vytvořena!");
            loadRooms();
        }
    };

    loadRooms();
    document.addEventListener("click", async (e) => {
        if (e.target.classList.contains("deleteRoom")) {
            e.stopPropagation(); // zabrání otevření místnosti

            const id = e.target.dataset.id;
            const password = prompt("Zadejte admin heslo pro smazání místnosti:");

            if (!password) return;

            const res = await fetch(`/api/rooms/${id}`, {
                method: "DELETE",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password })
            });

            const data = await res.json();

            if (data.success) {
                alert("Místnost byla smazána.");
                loadRooms();
            } else {
                alert(data.error);
            }
        }
    });

</script>
