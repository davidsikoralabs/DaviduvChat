<div class="auth-wrapper">

    <div class="auth-card">
        <h2>Přihlášení</h2>

        <label>Email</label>
        <input id="loginEmail" type="email" placeholder="Váš email">

        <label>Heslo</label>
        <input id="loginPassword" type="password" placeholder="Vaše heslo">

        <button id="loginBtn">Přihlásit se</button>

        <div class="auth-links">
            <a onclick="goTo('/register')">Nemáte účet? Registrace</a>
            <a onclick="goTo('/reset-password')">Zapomenuté heslo</a>
        </div>
    </div>

</div>

<script type="module">
import { supabase } from "/supabase.js";

document.getElementById("loginBtn").onclick = async () => {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value.trim();

    if (!email || !password) {
        alert("Vyplňte email i heslo.");
        return;
    }

    const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
    });

    if (error) {
        alert("Chyba: " + error.message);
        return;
    }

    goTo("/rooms");
};
</script>
