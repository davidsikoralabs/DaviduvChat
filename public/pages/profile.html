<div class="auth-wrapper">

    <div class="auth-card">
        <h2>Můj profil</h2>

        <div id="profileInfo">
            <p><strong>Uživatelské jméno:</strong> <span id="pUsername">...</span></p>
            <p><strong>Email:</strong> <span id="pEmail">...</span></p>
            <p><strong>Vytvořen:</strong> <span id="pCreated">...</span></p>
        </div>

        <button id="logoutBtn">Odhlásit se</button>

        <div class="auth-links">
            <a onclick="goTo('/rooms')">Zpět do místností</a>
        </div>
    </div>

</div>

<script type="module">
import { supabase } from "/supabase.js";

// Načtení dat uživatele
async function loadProfile() {
    const { data } = await supabase.auth.getUser();
    if (!data.user) {
        goTo("/login");
        return;
    }

    const user = data.user;

    document.getElementById("pUsername").textContent = user.user_metadata.username;
    document.getElementById("pEmail").textContent = user.email;
    document.getElementById("pCreated").textContent = new Date(user.created_at).toLocaleString();
}

// Odhlášení
document.getElementById("logoutBtn").onclick = async () => {
    await supabase.auth.signOut();
    goTo("/login");
};

loadProfile();
</script>
