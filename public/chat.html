<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatovací místnost</title>

  <link rel="stylesheet" href="/style.css">
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/pages/chat.js"></script>
</head>

<body>

  <div class="chat-container">

    <div class="chat-top">
      <button id="backToRooms">← Hlavní stránka</button>
      <button id="goToProfile">Můj profil</button>
    </div>

    <div class="layout">

      <div class="chat-wrapper">

        <h1 id="roomTitle" style="text-align:center; margin: 10px 0 0 0;">Místnost</h1>
        <p id="onlineCount" style="text-align:center; margin: 0 0 10px 0;">Online: 0</p>

        <div id="chat"></div>
        <span class="user clickable-user" data-userid="${msg.userId}">

        <div id="inputBar">
          <input id="message" type="text" placeholder="Napište zprávu...">
          <button id="sendButton">Odeslat</button>
        </div>
    
      </div>

    </div>

  </div>

</body>

</html>
