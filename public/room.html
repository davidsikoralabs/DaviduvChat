<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatovací místnost</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://daviduvchat.onrender.com/socket.io/socket.io.js"></script>
  <script defer src="room.js"></script>
</head>

<body>

  <div class="chat-wrapper">

    <!-- Nadpis a online count (původně jsi je neměl, ale nevadí) -->
    <h1 id="roomTitle" style="text-align:center; margin: 10px 0 0 0;">Místnost</h1>
    <p id="onlineCount" style="text-align:center; margin: 0 0 10px 0;">Online: 0</p>

    <!-- Chat okno -->
    <div id="chat"></div>

    <!-- Input bar (musí mít přesně tato ID) -->
    <div id="inputBar">
      <input id="message" type="text" placeholder="Napište zprávu...">
      <button id="sendButton">Odeslat</button>
    </div>

  </div>

</body>
</html>
